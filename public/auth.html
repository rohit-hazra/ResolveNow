<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResolveNow | Login & Register</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- SweetAlert2 CSS & JS -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>



    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-600 to-blue-600 flex items-center justify-center px-4">

    <!-- Auth Card -->
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <!-- Back to Home -->
        <a href="index.html" class="inline-flex items-center text-sm text-gray-500 hover:text-indigo-600 mb-6">
            <i class="fa-solid fa-arrow-left mr-2"></i>
            Back
        </a>

        <!-- Brand -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-indigo-600">
                <i class="fa-solid fa-scale-balanced mr-2"></i>ResolveNow
            </h1>
            <p class="text-gray-500 text-sm mt-2">
                Secure access to the grievance platform
            </p>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="space-y-5">
            <h2 class="text-xl font-semibold text-gray-800">Sign in</h2>

            <div>
                <label class="text-sm text-gray-600">Email address</label>
                <input type="email" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="text-sm text-gray-600">Password</label>
                <input type="password" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <button
                class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                Sign In
            </button>

            <p class="text-sm text-center text-gray-500">
                Don’t have an account?
                <span onclick="showRegister()" class="text-indigo-600 cursor-pointer font-medium hover:underline">
                    Create one
                </span>
            </p>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="space-y-5 hidden">
            <h2 class="text-xl font-semibold text-gray-800">Create account</h2>

            <div>
                <label class="text-sm text-gray-600">Full name</label>
                <input type="text" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="text-sm text-gray-600">Email address</label>
                <input type="email" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="text-sm text-gray-600">Password</label>
                <input type="password" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>

            <div>
                <label class="text-sm text-gray-600">Role</label>
                <select required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                    <option value="">Select role</option>
                    <option value="student">Student</option>
                    <option value="coordinator">Coordinator</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button
                class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">
                Register
            </button>

            <p class="text-sm text-center text-gray-500">
                Already have an account?
                <span onclick="showLogin()" class="text-indigo-600 cursor-pointer font-medium hover:underline">
                    Sign in
                </span>
            </p>
        </form>

    </div>

    <!-- JS -->
    <script>
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        // Toggle forms
        function showRegister() {
            loginForm.classList.add("hidden");
            registerForm.classList.remove("hidden");
        }

        function showLogin() {
            registerForm.classList.add("hidden");
            loginForm.classList.remove("hidden");
        }

        const API_URL = "http://localhost:5000/api";

        const saveToken = (token, user) => {
            localStorage.setItem("resolveNowToken", token);
            localStorage.setItem("resolveNowUser", JSON.stringify(user));
        };

        // SweetAlert2 Toast config
        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000,
            timerProgressBar: true,
        });

        // Login
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = loginForm.querySelector('input[type="email"]').value;
            const password = loginForm.querySelector('input[type="password"]').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.message || "Login failed");

                saveToken(data.token, data.user);
                loginForm.reset();

                Toast.fire({
                    icon: 'success',
                    title: `Welcome back, ${data.user.fullName}!`
                });

                setTimeout(() => {
                    if (data.user.role === "student") window.location.href = "student-dashboard.html";
                    else if (data.user.role === "coordinator") window.location.href = "coordinator-dashboard.html";
                    else if (data.user.role === "admin") window.location.href = "admin-dashboard.html";
                }, 4000); // small delay so toast is visible

            } catch (err) {
                Toast.fire({
                    icon: 'error',
                    title: err.message
                });
            }
        });

        // Register
        registerForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const fullName = registerForm.querySelector('input[type="text"]').value;
            const email = registerForm.querySelector('input[type="email"]').value;
            const password = registerForm.querySelector('input[type="password"]').value;
            const role = registerForm.querySelector('select').value;

            if (!role) {
                Toast.fire({
                    icon: 'warning',
                    title: "Please select a role"
                });
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ fullName, email, password, role }),
                });

                const data = await res.json();

                if (!res.ok) throw new Error(data.message || "Registration failed");

                saveToken(data.token, data.user);
                registerForm.reset();

                Toast.fire({
                    icon: 'success',
                    title: `Account created! Welcome, ${data.user.fullName}`
                });

                setTimeout(() => {
                    if (data.user.role === "student") window.location.href = "student-dashboard.html";
                    else if (data.user.role === "coordinator") window.location.href = "coordinator-dashboard.html";
                    else if (data.user.role === "admin") window.location.href = "admin-dashboard.html";
                }, 1000);

            } catch (err) {
                Toast.fire({
                    icon: 'error',
                    title: err.message
                });
            }
        });
    </script>




</body>

</html>
