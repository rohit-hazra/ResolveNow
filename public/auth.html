<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ResolveNow | Login & Register</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Card animation */
        .card-animate {
            animation: fadeSlide 0.8s ease forwards;
        }

        @keyframes fadeSlide {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Form transition */
        .form-transition {
            animation: formFade 0.4s ease forwards;
        }

        @keyframes formFade {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body
    class="min-h-screen relative overflow-hidden bg-gradient-to-br from-indigo-600 to-blue-600 flex items-center justify-center px-4">

    <!-- Auth Card -->
    <div
        class="relative bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl w-full max-w-md p-8 card-animate">

        <!-- Back -->
        <a href="index.html"
            class="inline-flex items-center text-sm text-gray-500 hover:text-indigo-600 mb-6 transition">
            <i class="fa-solid fa-arrow-left mr-2"></i> Back
        </a>

        <!-- Brand -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-indigo-600 tracking-wide">
                <i class="fa-solid fa-scale-balanced mr-2"></i>ResolveNow
            </h1>
            <p class="text-gray-500 text-sm mt-2">
                Secure grievance redressal system
            </p>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="space-y-5 form-transition">
            <h2 class="text-xl font-semibold text-gray-800">Sign in</h2>

            <div>
                <label class="text-sm text-gray-600">Email address</label>
                <input type="email" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="text-sm text-gray-600">Password</label>
                <input type="password" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <button
                class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/30 transition-all duration-300">
                Sign In
            </button>

            <p class="text-sm text-center text-gray-500">
                Don’t have an account?
                <span onclick="showRegister()"
                    class="text-indigo-600 cursor-pointer font-medium hover:underline">
                    Create one
                </span>
            </p>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="space-y-5 hidden form-transition">
            <h2 class="text-xl font-semibold text-gray-800">Create account</h2>

            <div>
                <label class="text-sm text-gray-600">Full name</label>
                <input type="text" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="text-sm text-gray-600">Email address</label>
                <input type="email" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="text-sm text-gray-600">Password</label>
                <input type="password" required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
            </div>

            <div>
                <label class="text-sm text-gray-600">Role</label>
                <select required
                    class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none transition">
                    <option value="">Select role</option>
                    <option value="student">Student</option>
                    <option value="coordinator">Coordinator</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button
                class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/30 transition-all duration-300">
                Register
            </button>

            <p class="text-sm text-center text-gray-500">
                Already have an account?
                <span onclick="showLogin()"
                    class="text-indigo-600 cursor-pointer font-medium hover:underline">
                    Sign in
                </span>
            </p>
        </form>

    </div>

    <!-- JS -->
    <script>
        const loginForm = document.getElementById("loginForm");
        const registerForm = document.getElementById("registerForm");

        function showRegister() {
            loginForm.classList.add("hidden");
            registerForm.classList.remove("hidden");
        }

        function showLogin() {
            registerForm.classList.add("hidden");
            loginForm.classList.remove("hidden");
        }

        const API_URL = "http://localhost:5000/api";

        const saveToken = (token, user) => {
            localStorage.setItem("resolveNowToken", token);
            localStorage.setItem("resolveNowUser", JSON.stringify(user));
        };

        const Toast = Swal.mixin({
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 2000,
            timerProgressBar: true,
        });

        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = loginForm.querySelector('input[type="email"]').value;
            const password = loginForm.querySelector('input[type="password"]').value;

            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password }),
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || "Login failed");

                saveToken(data.token, data.user);
                Toast.fire({ icon: 'success', title: `Welcome ${data.user.fullName}` });

                setTimeout(() => {
                    window.location.href = `${data.user.role}-dashboard.html`;
                }, 1200);

            } catch (err) {
                Toast.fire({ icon: 'error', title: err.message });
            }
        });

        registerForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const fullName = registerForm.querySelector('input[type="text"]').value;
            const email = registerForm.querySelector('input[type="email"]').value;
            const password = registerForm.querySelector('input[type="password"]').value;
            const role = registerForm.querySelector('select').value;

            if (!role) {
                Toast.fire({ icon: 'warning', title: "Select a role" });
                return;
            }

            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ fullName, email, password, role }),
                });

                const data = await res.json();
                if (!res.ok) throw new Error(data.message || "Registration failed");

                saveToken(data.token, data.user);
                Toast.fire({ icon: 'success', title: "Account created!" });

                setTimeout(() => {
                    window.location.href = `${data.user.role}-dashboard.html`;
                }, 1200);

            } catch (err) {
                Toast.fire({ icon: 'error', title: err.message });
            }
        });
    </script>

</body>
</html>
