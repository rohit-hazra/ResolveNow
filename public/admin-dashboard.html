<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-6">

<h2 class="text-2xl font-bold mb-4">System Overview</h2>

<div class="grid grid-cols-3 gap-4 mb-6">
  <div class="bg-white p-4 shadow rounded">
    <p>Total Complaints</p>
    <h3 id="total" class="text-2xl font-bold"></h3>
  </div>
  <div class="bg-white p-4 shadow rounded">
    <p>Resolved</p>
    <h3 id="resolved" class="text-2xl font-bold text-green-600"></h3>
  </div>
</div>

<script>
if (user.role !== "admin") location.href = "auth.html";

const API = "http://localhost:5000/api";

(async () => {
  const res = await fetch(`${API}/complaints`, {
    headers: { Authorization: `Bearer ${token}` }
  });
  const data = await res.json();

  document.getElementById("total").innerText = data.length;
  document.getElementById("resolved").innerText =
    data.filter(c => c.status === "resolved").length;
})();
</script>

</body>
</html>
